<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git Repo Ingest — Test</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      margin: 0;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
    }
    h1 { font-size: 20px; margin: 0 0 4px; }
    p.sub { margin: 0 0 24px; color: #94a3b8; font-size: 13px; }
    label { display: block; font-size: 13px; margin: 16px 0 6px; color: #cbd5e1; }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 14px;
    }
    input:focus, select:focus { outline: none; border-color: #3b82f6; }
    .radio-row { display: flex; gap: 20px; margin-top: 6px; }
    .radio-row label {
      display: flex; align-items: center; gap: 6px;
      margin: 0; cursor: pointer; font-size: 14px; color: #e2e8f0;
    }
    .radio-row input { width: auto; }
    button {
      margin-top: 22px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #475569; cursor: not-allowed; }
    .auth-methods {
      margin-top: 10px;
      padding: 14px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #172033;
    }
    .auth-methods .radio-row { flex-direction: column; gap: 10px; margin-top: 0; }
    .hint { font-size: 12px; color: #94a3b8; margin: 8px 0 0; }
    .stub {
      margin-top: 10px;
      padding: 12px;
      border: 1px dashed #f59e0b;
      border-radius: 8px;
      background: #2a2410;
      color: #fcd34d;
      font-size: 13px;
    }
    #token-group, #private-group, #browser-stub { display: none; }
    pre {
      margin-top: 22px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 14px;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 260px;
      overflow: auto;
    }
    .ok { border-color: #16a34a; }
    .err { border-color: #dc2626; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Git Repo Ingest</h1>
    <p class="sub">Test the <code>POST /ingest/git-repo</code> endpoint.</p>

    <label>Repository visibility</label>
    <div class="radio-row">
      <label><input type="radio" name="visibility" value="public" checked /> Public</label>
      <label><input type="radio" name="visibility" value="private" /> Private</label>
    </div>

    <label for="repo-url">Git repository URL</label>
    <input id="repo-url" type="text" placeholder="https://github.com/owner/repo" />

    <!-- Shown only when Private is selected -->
    <div id="private-group">
      <label>How do you want to authenticate?</label>
      <div class="auth-methods">
        <div class="radio-row">
          <label><input type="radio" name="authMethod" value="pat" /> Personal access token (PAT)</label>
          <label><input type="radio" name="authMethod" value="browser" /> Sign in with browser</label>
        </div>
      </div>

      <!-- PAT input: shown only when PAT method is chosen -->
      <div id="token-group">
        <label for="token">Personal access token</label>
        <input id="token" type="password" placeholder="Paste your PAT (e.g. ghp_…)" />
        <p class="hint">Token is sent only to your local backend to clone the repo.</p>
      </div>

      <!-- Browser sign-in: stubbed for now -->
      <div id="browser-stub" class="stub">
        Browser sign-in is not wired up yet. It needs a GitHub OAuth flow on the
        backend (login redirect + callback + token exchange). For now, use a PAT.
      </div>
    </div>

    <button id="submit">Ingest repository</button>

    <pre id="result" class="hidden"></pre>
  </div>

  <script>
    const API_BASE = "http://localhost:8000";

    const privateGroup = document.getElementById("private-group");
    const tokenGroup = document.getElementById("token-group");
    const browserStub = document.getElementById("browser-stub");
    const resultBox = document.getElementById("result");
    const submitBtn = document.getElementById("submit");

    function getVisibility() {
      return document.querySelector('input[name="visibility"]:checked').value;
    }
    function getAuthMethod() {
      const el = document.querySelector('input[name="authMethod"]:checked');
      return el ? el.value : null;
    }

    // Show/hide the private auth block based on visibility.
    document.querySelectorAll('input[name="visibility"]').forEach((radio) => {
      radio.addEventListener("change", () => {
        const isPrivate = getVisibility() === "private";
        privateGroup.style.display = isPrivate ? "block" : "none";
        if (!isPrivate) {
          // Reset private sub-state when switching back to public.
          tokenGroup.style.display = "none";
          browserStub.style.display = "none";
          document.querySelectorAll('input[name="authMethod"]').forEach(r => r.checked = false);
        }
      });
    });

    // Show PAT input or browser stub based on chosen auth method.
    document.querySelectorAll('input[name="authMethod"]').forEach((radio) => {
      radio.addEventListener("change", () => {
        const method = getAuthMethod();
        tokenGroup.style.display = method === "pat" ? "block" : "none";
        browserStub.style.display = method === "browser" ? "block" : "none";
      });
    });

    function show(text, ok) {
      resultBox.classList.remove("hidden");
      resultBox.textContent = text;
      resultBox.className = ok ? "ok" : "err";
    }

    submitBtn.addEventListener("click", async () => {
      const repoUrl = document.getElementById("repo-url").value.trim();
      const visibility = getVisibility();

      if (!repoUrl) {
        show("Please enter a repository URL.", false);
        return;
      }

      const payload = { repo_url: repoUrl, visibility };

      if (visibility === "private") {
        const method = getAuthMethod();
        if (!method) {
          show("Please choose an authentication method (PAT or browser sign-in).", false);
          return;
        }
        if (method === "browser") {
          show("Browser sign-in is not implemented yet. Please use a Personal access token for now.", false);
          return;
        }
        // PAT method
        const token = document.getElementById("token").value.trim();
        if (!token) {
          show("Please enter your personal access token.", false);
          return;
        }
        payload.access_token = token;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Cloning…";
      show("Request:\n" + JSON.stringify(payload, null, 2), true);

      try {
        const res = await fetch(`${API_BASE}/ingest/git-repo`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        show(`Status: ${res.status}\n\n` + JSON.stringify(data, null, 2), res.ok);
      } catch (err) {
        show("Network error: " + err.message + "\n\nIs the server running on " + API_BASE + " ?", false);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Ingest repository";
      }
    });
  </script>
</body>
</html>
